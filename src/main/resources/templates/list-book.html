<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:insert="common/header :: header"></div>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-book me-2"></i>Book Detail</h2>
            <a th:href="@{/books}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back to List
            </a>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped align-middle mb-0">
                        <tbody>
                            <tr>
                                <th style="width: 200px;"><i class="bi bi-upc me-1"></i>ISBN</th>
                                <td><span class="badge bg-secondary" th:text="${book.isbn}"></span></td>
                            </tr>
                            <tr>
                                <th><i class="bi bi-book me-1"></i>Book Name</th>
                                <td th:text="${book.name}"></td>
                            </tr>
                            <tr>
                                <th><i class="bi bi-tag me-1"></i>Serial Name</th>
                                <td th:text="${book.serialName}"></td>
                            </tr>
                            <tr>
                                <th><i class="bi bi-text-paragraph me-1"></i>Description</th>
                                <td th:text="${book.description}"></td>
                            </tr>
                            <tr>
                                <th><i class="bi bi-person me-1"></i>Author</th>
                                <td>
                                    <span th:each="author : ${book.authors}" class="badge bg-info me-1"
                                          th:text="${author.name}"></span>
                                </td>
                            </tr>
                            <tr>
                                <th><i class="bi bi-tags me-1"></i>Category</th>
                                <td>
                                    <span th:each="category : ${book.categories}" class="badge bg-warning me-1"
                                          th:text="${category.name}"></span>
                                </td>
                            </tr>
                            <tr>
                                <th><i class="bi bi-building me-1"></i>Publisher</th>
                                <td>
                                    <span th:each="publisher : ${book.publishers}" class="badge bg-success me-1"
                                          th:text="${publisher.name}"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:insert="common/footer :: footer"></div>
</body>
</html>
