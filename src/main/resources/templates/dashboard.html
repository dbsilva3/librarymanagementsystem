<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:insert="common/header :: header"></div>

    <div class="container py-4">
        <h2 class="mb-1"><i class="bi bi-speedometer2 me-2"></i>Dashboard</h2>
        <p class="text-muted mb-4">Welcome to the Library Management System</p>

        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card stat-card text-white h-100" style="background: linear-gradient(135deg, #4361ee, #3a0ca3);">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <p class="text-uppercase small mb-1 opacity-75">Total Books</p>
                                <h2 class="mb-0 fw-bold" th:text="${totalBooks}">0</h2>
                            </div>
                            <div class="rounded-circle d-flex align-items-center justify-content-center"
                                 style="width:56px;height:56px;background:rgba(255,255,255,0.15);">
                                <i class="bi bi-book" style="font-size:1.6rem;"></i>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent border-top border-light">
                        <a th:href="@{/books}" class="text-white text-decoration-none small fw-medium">
                            View All <i class="bi bi-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card stat-card text-white h-100" style="background: linear-gradient(135deg, #06d6a0, #058c6b);">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <p class="text-uppercase small mb-1 opacity-75">Total Authors</p>
                                <h2 class="mb-0 fw-bold" th:text="${totalAuthors}">0</h2>
                            </div>
                            <div class="rounded-circle d-flex align-items-center justify-content-center"
                                 style="width:56px;height:56px;background:rgba(255,255,255,0.15);">
                                <i class="bi bi-person" style="font-size:1.6rem;"></i>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent border-top border-light">
                        <a th:href="@{/authors}" class="text-white text-decoration-none small fw-medium">
                            View All <i class="bi bi-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card stat-card text-white h-100" style="background: linear-gradient(135deg, #f72585, #b5179e);">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <p class="text-uppercase small mb-1 opacity-75">Categories</p>
                                <h2 class="mb-0 fw-bold" th:text="${totalCategories}">0</h2>
                            </div>
                            <div class="rounded-circle d-flex align-items-center justify-content-center"
                                 style="width:56px;height:56px;background:rgba(255,255,255,0.15);">
                                <i class="bi bi-tags" style="font-size:1.6rem;"></i>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent border-top border-light">
                        <a th:href="@{/categories}" class="text-white text-decoration-none small fw-medium">
                            View All <i class="bi bi-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card stat-card text-white h-100" style="background: linear-gradient(135deg, #7209b7, #560bad);">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <p class="text-uppercase small mb-1 opacity-75">Publishers</p>
                                <h2 class="mb-0 fw-bold" th:text="${totalPublishers}">0</h2>
                            </div>
                            <div class="rounded-circle d-flex align-items-center justify-content-center"
                                 style="width:56px;height:56px;background:rgba(255,255,255,0.15);">
                                <i class="bi bi-building" style="font-size:1.6rem;"></i>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent border-top border-light">
                        <a th:href="@{/publishers}" class="text-white text-decoration-none small fw-medium">
                            View All <i class="bi bi-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-semibold"><i class="bi bi-clock-history me-2 text-primary"></i>Recent Books</h5>
                <a th:href="@{/books}" class="btn btn-sm btn-outline-primary">View All</a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th style="width: 50px;" class="text-center">#</th>
                                <th>ISBN</th>
                                <th>Book Name</th>
                                <th>Serial Name</th>
                                <th>Description</th>
                                <th class="text-center" style="width: 80px;">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="book, iter : ${recentBooks}">
                                <td class="text-center">
                                    <span class="text-muted small" th:text="${iter.index + 1}"></span>
                                </td>
                                <td><span class="badge bg-primary" th:text="${book.isbn}"></span></td>
                                <td class="fw-semibold" th:text="${book.name}"></td>
                                <td th:text="${book.serialName}"></td>
                                <td>
                                    <span class="text-truncate d-inline-block" style="max-width: 200px;"
                                          th:text="${book.description}"></span>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/book/{id}(id=${book.id})}" class="btn btn-sm btn-outline-info">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:insert="common/footer :: footer"></div>
</body>
</html>
