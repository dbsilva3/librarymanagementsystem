<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>All Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:insert="common/header :: header"></div>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-1"><i class="bi bi-book me-2"></i>Books</h2>
                <small class="text-muted">Manage your library's book collection</small>
            </div>
            <div>
                <a th:href="@{/add}" class="btn btn-primary me-2">
                    <i class="bi bi-plus-circle me-1"></i>Add Book
                </a>
                <a th:href="@{/export/all-book}" class="btn btn-outline-secondary">
                    <i class="bi bi-filetype-csv me-1"></i>Export CSV
                </a>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-body p-0">
                <div th:if="${books == null or books.totalElements == 0}" class="text-center py-5">
                    <i class="bi bi-inbox text-muted" style="font-size: 3.5rem;"></i>
                    <p class="text-muted mt-3 mb-0">No books found.</p>
                </div>

                <div th:if="${books != null and books.totalElements > 0}">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th style="width: 50px;" class="text-center">#</th>
                                    <th>ISBN</th>
                                    <th>Book Name</th>
                                    <th>Serial Name</th>
                                    <th>Description</th>
                                    <th class="text-center" style="width: 140px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="book, iter : ${books}">
                                    <td class="text-center">
                                        <span class="text-muted small" th:text="${iter.index + 1 + (books.number * books.size)}"></span>
                                    </td>
                                    <td><span class="badge bg-primary" th:text="${book.isbn}"></span></td>
                                    <td class="fw-semibold" th:text="${book.name}"></td>
                                    <td th:text="${book.serialName}"></td>
                                    <td>
                                        <span class="text-truncate d-inline-block" style="max-width: 200px;"
                                              th:text="${book.description}"></span>
                                    </td>
                                    <td class="text-center">
                                        <a th:href="@{/book/{id}(id=${book.id})}"
                                           class="btn btn-sm btn-outline-info" title="View">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/update/{id}(id=${book.id})}"
                                           class="btn btn-sm btn-outline-warning" title="Edit">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <a th:href="@{/remove-book/{id}(id=${book.id})}"
                                           class="btn btn-sm btn-outline-danger" title="Delete"
                                           onclick="return confirm('Are you sure you want to delete this book?');">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center px-3 py-2 border-top">
                        <small class="text-muted">
                            Showing <span th:text="${books.number * books.size + 1}"></span>
                            to <span th:text="${books.number * books.size + books.numberOfElements}"></span>
                            of <span th:text="${books.totalElements}"></span> entries
                        </small>
                        <nav th:if="${books.totalPages > 1}" aria-label="Page navigation">
                            <ul class="pagination pagination-sm mb-0">
                                <li class="page-item" th:classappend="${books.number == 0} ? 'disabled'">
                                    <a class="page-link" th:href="@{/books(size=${books.size}, page=${books.number})}">
                                        <i class="bi bi-chevron-left"></i>
                                    </a>
                                </li>
                                <li class="page-item" th:each="pageNumber : ${pageNumbers}"
                                    th:classappend="${pageNumber == books.number + 1} ? 'active'">
                                    <a class="page-link" th:text="${pageNumber}"
                                       th:href="@{/books(size=${books.size}, page=${pageNumber})}"></a>
                                </li>
                                <li class="page-item" th:classappend="${books.number == books.totalPages - 1} ? 'disabled'">
                                    <a class="page-link" th:href="@{/books(size=${books.size}, page=${books.number + 2})}">
                                        <i class="bi bi-chevron-right"></i>
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:insert="common/footer :: footer"></div>
</body>
</html>
