<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Update Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:insert="common/header :: header"></div>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-pencil-square me-2"></i>Update Book</h2>
            <a th:href="@{/books}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back to List
            </a>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <form th:action="@{/update-book/{id}(id=${bookDTO.id})}" th:object="${bookDTO}" method="post" class="row g-3">
                    <div class="col-md-6">
                        <label for="isbn" class="form-label">ISBN</label>
                        <input type="text" class="form-control" id="isbn" th:field="*{isbn}"
                               th:classappend="${#fields.hasErrors('isbn')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}"></div>
                    </div>

                    <div class="col-md-6">
                        <label for="name" class="form-label">Book Name</label>
                        <input type="text" class="form-control" id="name" th:field="*{name}"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="col-md-6">
                        <label for="serialName" class="form-label">Serial Name</label>
                        <input type="text" class="form-control" id="serialName" th:field="*{serialName}"
                               th:classappend="${#fields.hasErrors('serialName')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('serialName')}" th:errors="*{serialName}"></div>
                    </div>

                    <div class="col-md-6">
                        <label for="description" class="form-label">Description</label>
                        <input type="text" class="form-control" id="description" th:field="*{description}"
                               th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                    </div>

                    <div class="col-md-4">
                        <label for="categoryId" class="form-label">Category</label>
                        <select class="form-select" id="categoryId" th:field="*{categoryId}">
                            <option value="">-- Select Category --</option>
                            <option th:each="category : ${categories}" th:value="${category.id}"
                                    th:text="${category.name}"></option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label for="authorId" class="form-label">Author</label>
                        <select class="form-select" id="authorId" th:field="*{authorId}">
                            <option value="">-- Select Author --</option>
                            <option th:each="author : ${authors}" th:value="${author.id}"
                                    th:text="${author.name}"></option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label for="publisherId" class="form-label">Publisher</label>
                        <select class="form-select" id="publisherId" th:field="*{publisherId}">
                            <option value="">-- Select Publisher --</option>
                            <option th:each="publisher : ${publishers}" th:value="${publisher.id}"
                                    th:text="${publisher.name}"></option>
                        </select>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-1"></i>Update Book
                        </button>
                        <a th:href="@{/books}" class="btn btn-outline-secondary ms-2">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:insert="common/footer :: footer"></div>
</body>
</html>
