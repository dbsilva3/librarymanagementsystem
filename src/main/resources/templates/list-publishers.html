<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>All Publishers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:insert="common/header :: header"></div>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-1"><i class="bi bi-building me-2"></i>Publishers</h2>
                <small class="text-muted">Manage publishers</small>
            </div>
            <div>
                <a th:href="@{/addPublisher}" class="btn btn-primary me-2">
                    <i class="bi bi-plus-circle me-1"></i>Add Publisher
                </a>
                <a th:href="@{/export/all-publisher}" class="btn btn-outline-secondary">
                    <i class="bi bi-filetype-csv me-1"></i>Export CSV
                </a>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-body p-0">
                <div th:if="${publishers == null or publishers.totalElements == 0}" class="text-center py-5">
                    <i class="bi bi-inbox text-muted" style="font-size: 3.5rem;"></i>
                    <p class="text-muted mt-3 mb-0">No publishers found.</p>
                </div>

                <div th:if="${publishers != null and publishers.totalElements > 0}">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th style="width: 50px;" class="text-center">#</th>
                                    <th>Publisher Name</th>
                                    <th class="text-center" style="width: 120px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="publisher, iter : ${publishers}">
                                    <td class="text-center">
                                        <span class="text-muted small" th:text="${iter.index + 1 + (publishers.number * publishers.size)}"></span>
                                    </td>
                                    <td class="fw-semibold">
                                        <i class="bi bi-building text-info me-1"></i>
                                        <span th:text="${publisher.name}"></span>
                                    </td>
                                    <td class="text-center">
                                        <a th:href="@{/updatePublisher/{id}(id=${publisher.id})}"
                                           class="btn btn-sm btn-outline-warning" title="Edit">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <a th:href="@{/remove-publisher/{id}(id=${publisher.id})}"
                                           class="btn btn-sm btn-outline-danger" title="Delete"
                                           onclick="return confirm('Are you sure you want to delete this publisher?');">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center px-3 py-2 border-top">
                        <small class="text-muted">
                            Showing <span th:text="${publishers.number * publishers.size + 1}"></span>
                            to <span th:text="${publishers.number * publishers.size + publishers.numberOfElements}"></span>
                            of <span th:text="${publishers.totalElements}"></span> entries
                        </small>
                        <nav th:if="${publishers.totalPages > 1}" aria-label="Page navigation">
                            <ul class="pagination pagination-sm mb-0">
                                <li class="page-item" th:classappend="${publishers.number == 0} ? 'disabled'">
                                    <a class="page-link" th:href="@{/publishers(size=${publishers.size}, page=${publishers.number})}">
                                        <i class="bi bi-chevron-left"></i>
                                    </a>
                                </li>
                                <li class="page-item" th:each="pageNumber : ${pageNumbers}"
                                    th:classappend="${pageNumber == publishers.number + 1} ? 'active'">
                                    <a class="page-link" th:text="${pageNumber}"
                                       th:href="@{/publishers(size=${publishers.size}, page=${pageNumber})}"></a>
                                </li>
                                <li class="page-item" th:classappend="${publishers.number == publishers.totalPages - 1} ? 'disabled'">
                                    <a class="page-link" th:href="@{/publishers(size=${publishers.size}, page=${publishers.number + 2})}">
                                        <i class="bi bi-chevron-right"></i>
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:insert="common/footer :: footer"></div>
</body>
</html>
