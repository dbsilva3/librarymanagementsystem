<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Header</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a0ca3;
            --accent: #f72585;
            --bg-light: #f8f9fc;
            --card-shadow: 0 2px 16px rgba(67, 97, 238, 0.08);
            --table-header: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);
            --table-header-text: #ffffff;
            --row-hover: rgba(67, 97, 238, 0.04);
            --border-color: #e9ecef;
            --radius: 12px;
            --radius-sm: 8px;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%) !important;
            box-shadow: 0 2px 20px rgba(67, 97, 238, 0.3);
            padding: 0.6rem 0;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: -0.3px;
        }
        .navbar .nav-link {
            font-weight: 500;
            font-size: 0.88rem;
            padding: 0.5rem 0.85rem !important;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
            margin: 0 2px;
        }
        .navbar .nav-link:hover {
            background: rgba(255,255,255,0.15);
        }

        /* ===== CARDS ===== */
        .card {
            border: none;
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }
        .card-header {
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.25rem;
        }

        /* ===== TABELAS PROFISSIONAIS ===== */
        .table {
            margin-bottom: 0;
            border-collapse: separate;
            border-spacing: 0;
        }
        .table thead th {
            background: var(--table-header);
            color: var(--table-header-text);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 0.85rem 1rem;
            border: none;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .table thead th:first-child {
            border-radius: var(--radius-sm) 0 0 0;
        }
        .table thead th:last-child {
            border-radius: 0 var(--radius-sm) 0 0;
        }
        .table tbody tr {
            transition: all 0.15s ease;
            border-bottom: 1px solid var(--border-color);
        }
        .table tbody tr:hover {
            background-color: var(--row-hover);
            transform: scale(1.002);
        }
        .table tbody td {
            padding: 0.75rem 1rem;
            vertical-align: middle;
            font-size: 0.9rem;
            color: #495057;
        }
        .table-striped > tbody > tr:nth-of-type(odd) > * {
            --bs-table-bg-type: rgba(67, 97, 238, 0.015);
        }

        /* Numeração de linhas */
        .table tbody tr td:first-child {
            font-weight: 500;
        }

        /* Badges na tabela */
        .table .badge {
            font-weight: 500;
            font-size: 0.78rem;
            padding: 0.35em 0.65em;
            border-radius: 6px;
        }

        /* Botões de ação na tabela */
        .table .btn-sm {
            width: 32px;
            height: 32px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 0.8rem;
            transition: all 0.2s ease;
            margin: 0 2px;
        }
        .table .btn-sm:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }

        /* ===== PAGINAÇÃO ===== */
        .pagination .page-link {
            border: none;
            color: #495057;
            font-weight: 500;
            font-size: 0.88rem;
            padding: 0.5rem 0.85rem;
            margin: 0 3px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .pagination .page-item.active .page-link {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(67, 97, 238, 0.3);
        }
        .pagination .page-link:hover:not(.active) {
            background: rgba(67, 97, 238, 0.08);
            color: var(--primary);
        }

        /* ===== BOTÕES ===== */
        .btn-primary {
            background: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);
            border: none;
            font-weight: 500;
            padding: 0.5rem 1.2rem;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.35);
        }

        /* ===== FORMULÁRIOS ===== */
        .form-label {
            font-weight: 500;
            font-size: 0.88rem;
            color: #495057;
            margin-bottom: 0.4rem;
        }
        .form-control, .form-select {
            border-radius: var(--radius-sm);
            border: 1.5px solid #dee2e6;
            padding: 0.55rem 0.85rem;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.12);
        }

        /* ===== HEADINGS ===== */
        h2 {
            font-weight: 700;
            color: #212529;
            font-size: 1.5rem;
        }

        /* ===== DASHBOARD CARDS ===== */
        .stat-card {
            border: none;
            border-radius: var(--radius);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 768px) {
            .table thead th {
                font-size: 0.72rem;
                padding: 0.65rem 0.5rem;
            }
            .table tbody td {
                font-size: 0.82rem;
                padding: 0.6rem 0.5rem;
            }
            h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <nav th:fragment="header" class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
                <i class="bi bi-book me-2"></i>Library Management
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/dashboard}">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/books}">
                            <i class="bi bi-book me-1"></i>Books
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/authors}">
                            <i class="bi bi-person me-1"></i>Authors
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/publishers}">
                            <i class="bi bi-building me-1"></i>Publishers
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/categories}">
                            <i class="bi bi-tags me-1"></i>Categories
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
